upstream auth_service {
    server auth-service:8000;
}

upstream incident_service {
    server incident-service:8000;
}

upstream dispatch_service {
    server dispatch-service:8000;
}

upstream analytics_service {
    server analytics-service:8000;
}

server {
    listen 80;

    # ── Auth Service ─────────────────────────────────────────
    location /auth/ {
        proxy_pass http://auth_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Incident Service ──────────────────────────────────────
    location /incidents {
        proxy_pass http://incident_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Dispatch Service ──────────────────────────────────────
    location /vehicles {
        proxy_pass http://dispatch_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket support for real-time vehicle tracking
    location ~* ^/vehicles/(.+)/ws$ {
        proxy_pass http://dispatch_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Analytics Service ─────────────────────────────────────
    location /analytics/ {
        proxy_pass http://analytics_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Swagger docs passthrough (for each service) ───────────
    location /auth/docs {
        proxy_pass http://auth_service/docs;
        proxy_set_header Host $host;
    }

    location /incidents/docs {
        proxy_pass http://incident_service/docs;
        proxy_set_header Host $host;
    }

    location /vehicles/docs {
        proxy_pass http://dispatch_service/docs;
        proxy_set_header Host $host;
    }

    location /analytics/docs {
        proxy_pass http://analytics_service/docs;
        proxy_set_header Host $host;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }
}
