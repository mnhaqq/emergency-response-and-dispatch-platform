upstream auth_service {
    server ${AUTH_SERVICE_HOST};
}

upstream incident_service {
    server ${INCIDENT_SERVICE_HOST};
}

upstream dispatch_service {
    server ${DISPATCH_SERVICE_HOST};
}

upstream analytics_service {
    server ${ANALYTICS_SERVICE_HOST};
}

server {
    listen 80;

    # ── Auth Service ─────────────────────────────────────────
    location /auth/ {
        proxy_pass https://auth_service;
        proxy_set_header Host ${AUTH_SERVICE_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ── Incident Service ──────────────────────────────────────
    location /incidents {
        proxy_pass https://incident_service;
        proxy_set_header Host ${INCIDENT_SERVICE_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ── Dispatch Service ──────────────────────────────────────
    location /vehicles {
        proxy_pass https://dispatch_service;
        proxy_set_header Host ${DISPATCH_SERVICE_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # WebSocket support for real-time vehicle tracking
    location ~* ^/vehicles/(.+)/ws$ {
        proxy_pass https://dispatch_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host ${DISPATCH_SERVICE_HOST};
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_ssl_server_name on;
    }

    # ── Analytics Service ─────────────────────────────────────
    location /analytics/ {
        proxy_pass https://analytics_service;
        proxy_set_header Host ${ANALYTICS_SERVICE_HOST};
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_ssl_server_name on;
    }

    # ── Health check ──────────────────────────────────────────
    location /health {
        return 200 '{"status":"ok","gateway":"nginx"}';
        add_header Content-Type application/json;
    }
}